let markers = [];
function makeMarker(sede) {
  const color = COLORES[sede.Gestión] || "#A855F7";

  const icon = L.divIcon({
    html: `<div style="width:${r*2}px;height:${r*2}px;background:${color};border:2px solid rgba(255,255,255,0.6);border-radius:50%;box-shadow:0 0 12px ${color}88;cursor:pointer;"></div>`,
